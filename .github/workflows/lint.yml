name: Lint

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  android-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run Android lint
        run: |
          chmod +x gradlew
          ./gradlew lintDebug
