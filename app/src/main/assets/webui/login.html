<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Y1 · Unlock</title>
<link rel="stylesheet" href="/app.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login { width: 100%; max-width: 340px; text-align: center; }
  .brand { font-size: 22px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
  .brand .dot { color: var(--accent); }
  .tag { color: var(--text-2); font-size: 13px; margin-bottom: 30px; }
  .pin {
    width: 100%; text-align: center; font-size: 30px; letter-spacing: 14px; font-weight: 700;
    padding: 16px 10px; color: var(--accent); background: var(--btn); border: 1px solid var(--line);
    outline: none; font-family: 'Courier New', monospace; text-indent: 14px;
  }
  .pin:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }
  .msg { min-height: 20px; font-size: 13px; margin: 14px 0; color: var(--danger); }
  .msg.ok { color: var(--good); }
  .lockicon { font-size: 30px; margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="login">
    <div class="lockicon">🔒</div>
    <div class="brand">Mint Mango<span class="dot">.</span></div>
    <div class="tag">Enter the PIN shown on your Y1's Web Server screen</div>
    <input id="pin" class="pin" type="tel" inputmode="numeric" maxlength="6" placeholder="——————" autocomplete="off" autofocus>
    <div class="msg" id="msg"></div>
    <button class="btn-cta" id="go">Unlock</button>
  </div>
<script>
(function(){
  var pin = document.getElementById('pin');
  var msg = document.getElementById('msg');
  var go = document.getElementById('go');
  var params = new URLSearchParams(location.search);
  var next = params.get('next') || '/';

  pin.addEventListener('input', function(){
    pin.value = pin.value.replace(/\D/g,'').slice(0,6);
    if (pin.value.length === 6) submitPin();
  });
  pin.addEventListener('keydown', function(e){ if(e.key==='Enter') submitPin(); });
  go.addEventListener('click', submitPin);

  var busy = false;
  function submitPin(){
    if (busy) return;
    var code = pin.value.trim();
    if (code.length < 4) { msg.className='msg'; msg.textContent='Enter your PIN'; return; }
    busy = true; go.disabled = true; msg.className='msg'; msg.textContent='Checking…';
    fetch('/api/login', { method:'POST', body: JSON.stringify({ pin: code }) })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.ok) { msg.className='msg ok'; msg.textContent='Unlocked'; location.href = next; }
        else { msg.className='msg'; msg.textContent = d.error || 'Incorrect PIN'; pin.value=''; pin.focus(); busy=false; go.disabled=false; }
      })
      .catch(function(){ msg.className='msg'; msg.textContent='Could not reach the device'; busy=false; go.disabled=false; });
  }
})();
</script>
</body>
</html>
