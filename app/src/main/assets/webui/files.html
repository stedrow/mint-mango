<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Y1 · Files</title>
<link rel="stylesheet" href="/app.css">
<style>
  body { padding-bottom: 40px; }
  .crumbs { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-top: 12px; font-size: 13px; }
  .crumb { color: var(--accent); cursor: pointer; padding: 2px 4px; }
  .crumb:hover { text-decoration: underline; }
  .crumb.cur { color: var(--text); cursor: default; }
  .crumb-sep { color: var(--text-2); }
  .drop { border: 1px dashed var(--line); transition: 0.2s; }
  .drop.over { border-color: var(--accent); background: var(--btn-hi); }
  .uploadrow { display: flex; gap: 8px; flex-wrap: wrap; }
  .uploadrow .input { flex: 1 1 160px; }
  .status { margin-top: 10px; font-size: 13px; color: var(--good); min-height: 18px; }
  .banner {
    display: flex; align-items: center; gap: 14px; padding: 16px 18px; margin-bottom: 16px; cursor: pointer;
    background: linear-gradient(120deg, #08201E, var(--bg-elev)); border: 1px solid var(--line);
  }
  .banner:hover { border-color: var(--accent); }
  .banner .b-ico { font-size: 26px; }
  .banner .b-main { flex-grow: 1; }
  .banner .b-t { font-size: 15px; font-weight: 700; }
  .banner .b-s { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .banner .b-arrow { color: var(--accent); font-size: 18px; }
  /* modal */
  .modal { position: fixed; inset: 0; z-index: 200; background: rgba(3,7,7,0.92); backdrop-filter: blur(6px); display: none; padding: 20px; }
  .modal.open { display: flex; align-items: center; justify-content: center; }
  .modal-inner { width: 100%; max-width: 820px; max-height: 100%; display: flex; flex-direction: column; }
  .modal-title { color: var(--accent); font-weight: 700; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #editArea {
    width: 100%; height: 60vh; background: var(--bg-elev); color: var(--text); font-family: 'Courier New', monospace;
    font-size: 14px; border: 1px solid var(--line); padding: 14px; resize: none; outline: none;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 14px; }
  #audioDock { position: fixed; left: 0; right: 0; bottom: 0; z-index: 150; background: rgba(5,11,11,0.92); backdrop-filter: blur(12px); border-top: 1px solid var(--accent); padding: 12px 16px; display: none; }
  #audioDock .wrap { display: flex; flex-direction: column; gap: 8px; }
  #audioTitle { font-size: 13px; color: var(--accent); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  audio { width: 100%; }
</style>
</head>
<body>
<div class="offline" id="offline">⚠ Device unreachable — is the Web Server still running?</div>

<header class="hdr">
  <div class="wrap">
    <div class="hdr-row">
      <div class="title">Files<span class="dot">.</span></div>
      <div class="hdr-meta"><span id="disk">·</span></div>
    </div>
    <div class="crumbs" id="crumbs"></div>
  </div>
</header>

<main class="wrap">
  <a class="banner" href="/music">
    <div class="b-ico">🎧</div>
    <div class="b-main">
      <div class="b-t">Browse &amp; Download Music</div>
      <div class="b-s">Search Navidrome and queue albums to this device</div>
    </div>
    <div class="b-arrow">〉</div>
  </a>

  <div class="panel drop" id="drop">
    <div class="panel-title">⬆ Upload</div>
    <div class="muted" style="font-size:12px; margin:-6px 0 12px;">Drag &amp; drop files or folders anywhere in this box.</div>
    <div class="uploadrow" style="margin-bottom:10px;">
      <input class="input" id="folderName" placeholder="New folder name…">
      <button class="btn" onclick="createFolder()">Create Folder</button>
    </div>
    <div class="uploadrow">
      <input class="input" id="fileInput" type="file" multiple>
      <button class="btn btn-ghost" onclick="uploadPicked()">Upload Here</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="panel">
    <div class="panel-title">🎵 Navidrome</div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <input class="input" id="navUrl" placeholder="Server URL — e.g. http://192.168.1.100:4533">
      <input class="input" id="navUser" placeholder="Username">
      <input class="input" id="navPass" type="password" placeholder="Password">
    </div>
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="btn btn-primary" style="flex:1;" onclick="saveNav()">Save &amp; Test</button>
      <button class="btn" style="flex:1;" onclick="loadNav()">Reload</button>
    </div>
    <div class="status" id="navStatus" style="color:var(--text-2);"></div>
  </div>

  <div id="fileList" class="hint">Loading…</div>
</main>

<!-- Text editor modal -->
<div class="modal" id="editModal">
  <div class="modal-inner">
    <div class="modal-title" id="editTitle"></div>
    <textarea id="editArea" spellcheck="false" wrap="off"></textarea>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1;" onclick="saveEdit()">Save</button>
      <button class="btn btn-danger" style="flex:1;" onclick="closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<!-- Audio preview dock -->
<div id="audioDock">
  <div class="wrap">
    <div id="audioTitle"></div>
    <audio id="audio" controls controlsList="nodownload"></audio>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var cur = '';
  var listEl = document.getElementById('fileList');
  var IMG = ['jpg','jpeg','png','webp','gif','bmp'];
  var AUD = ['mp3','flac','wav','ogg','m4a','aac','opus'];
  var TXT = ['json','txt','xml','ini','md','m3u','m3u8','eq','log','cfg','csv'];

  function esc(s){ return (s==null?'':(''+s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function jesc(s){ return (''+s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
  function ext(n){ return (n.split('.').pop()||'').toLowerCase(); }

  var toastEl = document.getElementById('toast'), toastT;
  function toast(m){ toastEl.textContent=m; toastEl.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove('show');},2600); }
  var offEl = document.getElementById('offline');
  function online(ok){ offEl.classList.toggle('show', !ok); }

  function fmtSize(b){ if(b==null) return ''; var u=['B','KB','MB','GB','TB']; var i=0; while(b>=1024&&i<u.length-1){b/=1024;i++;} return (i?b.toFixed(1):b)+' '+u[i]; }

  function crumbs(){
    var el = document.getElementById('crumbs');
    var parts = cur ? cur.split('/') : [];
    var html = '<span class="crumb' + (parts.length?'':' cur') + '" onclick="go(\'\')">⌂ sdcard</span>';
    var acc = '';
    parts.forEach(function(p, i){
      acc = acc ? acc + '/' + p : p;
      var last = i === parts.length - 1;
      html += '<span class="crumb-sep">/</span><span class="crumb' + (last?' cur':'') + '" onclick="go(\'' + jesc(acc) + '\')">' + esc(p) + '</span>';
    });
    el.innerHTML = html;
  }

  window.go = function(path){ cur = path; load(); };

  function load(){
    crumbs();
    fetch('/api/list?dir=' + encodeURIComponent(cur))
      .then(function(r){ return r.json(); })
      .then(function(data){
        online(true);
        if (!data.length) { listEl.className='hint'; listEl.innerHTML = 'This folder is empty.'; return; }
        listEl.className='';
        var html = '';
        data.forEach(function(f){
          var e = ext(f.name), full = cur ? cur + '/' + f.name : f.name, sp = encodeURIComponent(full), nm = jesc(f.name);
          var ico, click='';
          if (f.isDir) { ico='<div class="row-ico">📁</div>'; click="onclick=\"go('"+jesc(full)+"')\""; }
          else if (IMG.indexOf(e)>=0) { ico='<img class="row-thumb" loading="lazy" src="/api/file?path='+sp+'">'; click="onclick=\"window.open('/api/file?path="+sp+"','_blank')\""; }
          else if (AUD.indexOf(e)>=0) { ico='<div class="row-ico">♪</div>'; click="onclick=\"playAudio('"+sp+"','"+nm+"')\""; }
          else if (TXT.indexOf(e)>=0) { ico='<div class="row-ico">📄</div>'; click="onclick=\"openEdit('"+sp+"','"+nm+"')\""; }
          else { ico='<div class="row-ico">▪</div>'; }
          var actions = '<div class="row-actions">';
          if (!f.isDir && TXT.indexOf(e)>=0) actions += '<button class="iconbtn" onclick="event.stopPropagation();openEdit(\''+sp+'\',\''+nm+'\')">Edit</button>';
          actions += '<button class="iconbtn" onclick="event.stopPropagation();renameItem(\''+nm+'\')">Rename</button>';
          actions += '<button class="iconbtn" style="color:var(--danger);" onclick="event.stopPropagation();del(\''+nm+'\')">Del</button></div>';
          html += '<div class="row" '+click+'>'+ico+'<div class="row-main"><div class="row-title">'+esc(f.name)+'</div></div>'+actions+'</div>';
        });
        listEl.innerHTML = html;
      })
      .catch(function(){ online(false); listEl.className='hint'; listEl.innerHTML='⚠ Could not load files.'; });
  }

  function disk(){
    fetch('/api/diskinfo').then(function(r){return r.json();}).then(function(d){
      if (d.freeBytes!=null) document.getElementById('disk').innerHTML = '💾 ' + fmtSize(d.freeBytes) + ' free';
    }).catch(function(){});
  }

  window.createFolder = function(){
    var n = document.getElementById('folderName').value.trim(); if(!n) return;
    fetch('/api/create?dir='+encodeURIComponent(cur)+'&name='+encodeURIComponent(n), {method:'POST'})
      .then(function(){ document.getElementById('folderName').value=''; load(); toast('Folder created'); });
  };
  window.renameItem = function(oldName){
    var nn = prompt('Rename “'+oldName+'” to:', oldName);
    if(!nn || nn===oldName) return;
    fetch('/api/rename?dir='+encodeURIComponent(cur)+'&old='+encodeURIComponent(oldName)+'&new='+encodeURIComponent(nn), {method:'POST'}).then(function(){ load(); });
  };
  window.del = function(name){
    if(!confirm('Delete “'+name+'”?')) return;
    fetch('/api/delete?path='+encodeURIComponent(cur?cur+'/'+name:name), {method:'POST'}).then(function(){ load(); disk(); toast('Deleted'); });
  };

  // ── Upload ───────────────────────────────────────────
  var st = document.getElementById('status');
  window.uploadPicked = function(){
    var files = document.getElementById('fileInput').files;
    if(!files.length){ toast('Choose files first'); return; }
    uploadFlat(files);
  };
  function uploadFlat(files){
    var i = 0;
    (function next(){
      if (i >= files.length){ st.textContent='✓ Upload complete'; document.getElementById('fileInput').value=''; load(); disk(); return; }
      var f = files[i]; st.textContent = 'Uploading '+f.name+' ('+(i+1)+'/'+files.length+')…';
      fetch('/api/upload?dir='+encodeURIComponent(cur)+'&name='+encodeURIComponent(f.name), {method:'POST', body:f})
        .then(function(){ i++; next(); })
        .catch(function(){ st.textContent='⚠ Upload failed on '+f.name; });
    })();
  }
  function uploadTree(items){
    var i = 0;
    (function next(){
      if (i >= items.length){ st.textContent='✓ Upload complete'; load(); disk(); return; }
      var it = items[i], dir = cur;
      if (it.path){ var sub = it.path.replace(/\/$/,''); dir = cur ? cur+'/'+sub : sub; }
      st.textContent = 'Uploading '+(it.path||'')+it.file.name+' ('+(i+1)+'/'+items.length+')…';
      fetch('/api/upload?dir='+encodeURIComponent(dir)+'&name='+encodeURIComponent(it.file.name), {method:'POST', body:it.file})
        .then(function(){ i++; next(); })
        .catch(function(){ st.textContent='⚠ Upload failed'; });
    })();
  }
  var drop = document.getElementById('drop');
  drop.addEventListener('dragover', function(e){ e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', function(e){ e.preventDefault(); drop.classList.remove('over'); });
  drop.addEventListener('drop', function(e){
    e.preventDefault(); drop.classList.remove('over');
    var its = e.dataTransfer.items;
    if(!its){ if(e.dataTransfer.files.length) uploadFlat(e.dataTransfer.files); return; }
    st.textContent = 'Scanning…'; var out=[], pending=0;
    function scan(entry, path){
      if(entry.isFile){ pending++; entry.file(function(f){ out.push({file:f, path:path}); if(--pending===0) done(); }); }
      else if(entry.isDirectory){ pending++; entry.createReader().readEntries(function(ents){ ents.forEach(function(en){ scan(en, path+entry.name+'/'); }); if(--pending===0) done(); }); }
    }
    function done(){ if(out.length) uploadTree(out); else st.textContent='No files found.'; }
    for(var i=0;i<its.length;i++){ var en = its[i].webkitGetAsEntry(); if(en){ pending++; setTimeout((function(en){return function(){ scan(en,''); if(--pending===0&&!out.length) done(); };})(en),0); } }
  });

  // ── Editor ───────────────────────────────────────────
  var editPath = '';
  window.openEdit = function(sp, name){
    editPath = sp;
    document.getElementById('editTitle').textContent = '📄 ' + name;
    document.getElementById('editArea').value = 'Loading…';
    document.getElementById('editModal').classList.add('open');
    fetch('/api/file?path='+sp).then(function(r){return r.text();}).then(function(t){ document.getElementById('editArea').value = t; });
  };
  window.closeEdit = function(){ document.getElementById('editModal').classList.remove('open'); editPath=''; };
  window.saveEdit = function(){
    fetch('/api/save?path='+editPath, {method:'POST', body:document.getElementById('editArea').value})
      .then(function(){ toast('✓ Saved'); closeEdit(); })
      .catch(function(){ toast('⚠ Save failed'); });
  };

  // ── Audio ────────────────────────────────────────────
  window.playAudio = function(sp, name){
    document.getElementById('audioDock').style.display='block';
    document.getElementById('audioTitle').textContent = '▶ ' + name;
    var a = document.getElementById('audio'); a.src = '/api/file?path='+sp; a.play();
  };

  // ── Navidrome settings (password-echo safe) ──────────
  window.loadNav = function(){
    fetch('/api/navidrome-settings').then(function(r){return r.json();}).then(function(d){
      document.getElementById('navUrl').value = d.url||'';
      document.getElementById('navUser').value = d.user||'';
      var pass = document.getElementById('navPass');
      pass.value=''; pass.placeholder = d.hasPassword ? '•••••• (unchanged)' : 'Password';
      var s = document.getElementById('navStatus');
      s.style.color='var(--text-2)'; s.textContent = d.url ? 'Loaded current settings.' : 'Not configured yet.';
    }).catch(function(){});
  };
  window.saveNav = function(){
    var url=document.getElementById('navUrl').value.trim(), user=document.getElementById('navUser').value.trim(), pass=document.getElementById('navPass').value;
    var s = document.getElementById('navStatus');
    if(!url||!user){ s.style.color='var(--danger)'; s.textContent='URL and username are required.'; return; }
    s.style.color='var(--text-2)'; s.textContent='Saving & testing…';
    var body = { url:url, user:user };
    if (pass) body.pass = pass;               // omit when blank → keep existing password
    fetch('/api/navidrome-settings', {method:'POST', body:JSON.stringify(body)})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok){ s.style.color='var(--good)'; s.textContent='✓ Saved & connected. Open Music on the Y1.'; }
        else { s.style.color='var(--danger)'; s.textContent='Saved, but could not connect: '+(d.error||'unknown'); }
        loadNav();
      })
      .catch(function(e){ s.style.color='var(--danger)'; s.textContent='Request failed'; });
  };

  document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeEdit(); } });

  load(); disk(); loadNav();
})();
</script>
</body>
</html>
