<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Y1 Music</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Roboto', 'Segoe UI', sans-serif;
    background: #1E1E24; color: #E0E0E0; margin: 0;
    padding: 0 0 140px 0; -webkit-tap-highlight-color: transparent;
  }
  a { color: inherit; }

  /* Sticky header + search */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(30,30,36,0.96); backdrop-filter: blur(8px);
    border-bottom: 1px solid #2E2E38; padding: 14px 16px 10px;
  }
  .hrow { display: flex; align-items: center; gap: 12px; max-width: 1000px; margin: 0 auto; }
  .back { font-size: 22px; color: #B39DDB; text-decoration: none; padding: 4px; }
  h1 { font-size: 19px; font-weight: 600; margin: 0; letter-spacing: 0.3px; flex-grow: 1; }
  .searchwrap { max-width: 1000px; margin: 10px auto 0; position: relative; }
  #q {
    width: 100%; font-size: 15px; padding: 12px 40px 12px 16px; border: none; outline: none;
    border-radius: 24px; background: #2A2A35; color: #E0E0E0;
  }
  #q::placeholder { color: #7A7A88; }
  .clearq {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: #7A7A88; cursor: pointer; font-size: 18px; display: none;
  }

  /* Filter chips */
  .chips { display: flex; gap: 8px; max-width: 1000px; margin: 12px auto 0; padding: 0 16px; flex-wrap: wrap; }
  .chip {
    font-size: 13px; padding: 7px 14px; border-radius: 16px; background: #2A2A35;
    color: #B0B0BE; cursor: pointer; border: 1px solid transparent; transition: 0.15s; user-select: none;
  }
  .chip.active { background: #B39DDB; color: #191921; font-weight: 600; }

  main { max-width: 1000px; margin: 0 auto; padding: 18px 16px 0; }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #8A8A98; margin: 18px 4px 12px; }
  .hint { color: #8A8A98; text-align: center; padding: 40px 20px; font-size: 15px; }

  /* Album grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
  .card { cursor: pointer; transition: transform 0.12s; }
  .card:active { transform: scale(0.97); }
  .cover {
    width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover;
    background: linear-gradient(135deg, #33333F, #26262F); display: block;
    box-shadow: 0 4px 10px rgba(0,0,0,0.35);
  }
  .cover.ph { display: flex; align-items: center; justify-content: center; font-size: 34px; color: #4A4A58; }
  .cname { font-size: 14px; font-weight: 500; margin: 9px 2px 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cartist { font-size: 12px; color: #9090A0; margin: 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Song rows (search results) */
  .songrow {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px;
    background: #24242E; margin-bottom: 6px;
  }
  .songrow .sart { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #33333F; flex-shrink: 0; }
  .songmeta { flex-grow: 1; overflow: hidden; }
  .stitle { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ssub { font-size: 12px; color: #9090A0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dlbtn {
    flex-shrink: 0; background: #383848; color: #B39DDB; border: none; border-radius: 18px;
    font-size: 13px; font-weight: 600; padding: 8px 14px; cursor: pointer; transition: 0.15s;
  }
  .dlbtn:hover { background: #454558; }
  .dlbtn.done { background: transparent; color: #81C784; cursor: default; }
  .dlbtn:disabled { opacity: 0.5; cursor: default; }

  /* Album detail overlay */
  #detail {
    position: fixed; inset: 0; z-index: 200; background: #1E1E24; overflow-y: auto;
    display: none; padding-bottom: 140px;
  }
  .dhead { position: relative; padding: 20px 16px; display: flex; gap: 18px; align-items: flex-end;
    background: linear-gradient(180deg, #2C2540, #1E1E24); }
  .dclose { position: absolute; top: 14px; left: 14px; font-size: 26px; color: #E0E0E0; cursor: pointer; }
  .dcover { width: 150px; height: 150px; border-radius: 14px; object-fit: cover; flex-shrink: 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5); background: #33333F; }
  .dtitle { font-size: 22px; font-weight: 700; margin: 0 0 6px; }
  .dsub { font-size: 14px; color: #B0B0BE; }
  .dactions { max-width: 1000px; margin: 0 auto; padding: 16px; }
  .dlall {
    width: 100%; background: #B39DDB; color: #191921; border: none; border-radius: 24px;
    font-size: 16px; font-weight: 700; padding: 14px; cursor: pointer; margin-bottom: 8px;
  }
  .dlall:active { background: #9575CD; }
  .dsongs { max-width: 1000px; margin: 0 auto; padding: 0 16px; }
  .trow { display: flex; align-items: center; gap: 12px; padding: 12px 6px; border-bottom: 1px solid #2A2A34; }
  .tnum { width: 26px; text-align: center; color: #7A7A88; font-size: 13px; flex-shrink: 0; }
  .tmeta { flex-grow: 1; overflow: hidden; }
  .tdur { color: #7A7A88; font-size: 12px; flex-shrink: 0; }

  /* Bottom download-manager bar */
  #dock {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 300;
    background: #252530; border-top: 1px solid #3A3A46; box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
  }
  .dockbar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; max-width: 1000px; margin: 0 auto; }
  .qtoggle { display: flex; background: #1E1E24; border-radius: 16px; padding: 3px; flex-shrink: 0; }
  .qtoggle span {
    font-size: 12px; padding: 6px 11px; border-radius: 13px; cursor: pointer; color: #9090A0; user-select: none;
  }
  .qtoggle span.on { background: #B39DDB; color: #191921; font-weight: 600; }
  .dockinfo { flex-grow: 1; overflow: hidden; }
  .dockmain { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .docksub { font-size: 12px; color: #9090A0; }
  .bar { height: 4px; background: #1E1E24; border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .bar > div { height: 100%; background: #B39DDB; width: 0%; transition: width 0.3s; border-radius: 2px; }
  .bar.indet > div { width: 35%; animation: slide 1.2s infinite ease-in-out; }
  @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
  .chev { color: #9090A0; cursor: pointer; font-size: 18px; flex-shrink: 0; padding: 4px; }
  #pending { max-height: 0; overflow: hidden; transition: max-height 0.25s; max-width: 1000px; margin: 0 auto; }
  #pending.open { max-height: 240px; overflow-y: auto; }
  #pendingList { padding: 4px 16px 12px; }
  .prow { font-size: 13px; color: #B0B0BE; padding: 6px 0; border-top: 1px solid #2E2E38; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clearbtn { background: #3A2A2E; color: #E57373; border: none; border-radius: 14px; font-size: 12px; padding: 6px 12px; cursor: pointer; }

  /* toast */
  #toast {
    position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
    background: #383848; color: #E0E0E0; padding: 12px 20px; border-radius: 22px; font-size: 14px;
    z-index: 400; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 90%;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  #toast.show { opacity: 1; }
  .spin { display: inline-block; width: 40px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="hrow">
    <a class="back" href="/" title="File Manager">‹</a>
    <h1>Music</h1>
  </div>
  <div class="searchwrap">
    <input id="q" type="text" placeholder="Search albums, songs, artists…" autocomplete="off">
    <span class="clearq" id="clearq">✕</span>
  </div>
  <div class="chips" id="chips">
    <div class="chip active" data-type="newest">Newest</div>
    <div class="chip" data-type="frequent">Most Played</div>
    <div class="chip" data-type="random">Random</div>
    <div class="chip" data-type="alphabeticalByName">A–Z</div>
  </div>
</header>

<main id="main">
  <div class="hint">Loading…</div>
</main>

<!-- Album detail overlay -->
<div id="detail">
  <div class="dhead">
    <span class="dclose" onclick="closeDetail()">‹</span>
    <img class="dcover" id="dcover" alt="">
    <div>
      <div class="dtitle" id="dtitle"></div>
      <div class="dsub" id="dsub"></div>
    </div>
  </div>
  <div class="dactions">
    <button class="dlall" id="dlall" onclick="downloadCurrentAlbum()">⬇ Download Album</button>
  </div>
  <div class="dsongs" id="dsongs"></div>
</div>

<!-- Download manager dock -->
<div id="dock">
  <div id="pending"><div id="pendingList"></div></div>
  <div class="dockbar">
    <div class="qtoggle" id="qtoggle" title="Download quality">
      <span data-q="orig" class="on">Original</span>
      <span data-q="mp3">MP3</span>
    </div>
    <div class="dockinfo">
      <div class="dockmain" id="dockmain">No downloads</div>
      <div class="docksub" id="docksub">Queue is empty</div>
      <div class="bar" id="bar"><div id="barfill"></div></div>
    </div>
    <span class="chev" id="chev" onclick="togglePending()">⌃</span>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  var main = document.getElementById('main');
  var q = document.getElementById('q');
  var clearq = document.getElementById('clearq');
  var quality = 'orig';          // 'orig' | 'mp3'
  var browseType = 'newest';
  var currentAlbum = null;       // {id, name, artist, coverArt}
  var searchTimer = null;
  var pollTimer = null;

  function coverUrl(id, size){ return id ? '/api/navidrome/cover?id=' + encodeURIComponent(id) + '&size=' + size : ''; }
  function esc(s){ return (s==null?'':(''+s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDur(sec){ if(!sec) return ''; var m=Math.floor(sec/60), s=sec%60; return m+':'+(s<10?'0':'')+s; }

  var toastEl = document.getElementById('toast'), toastT = null;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(function(){ toastEl.classList.remove('show'); }, 2600);
  }

  function coverImg(id, size, cls){
    if(!id) return '<div class="'+cls+' ph">♪</div>';
    return '<img class="'+cls+'" loading="lazy" src="'+coverUrl(id,size)+'" ' +
           'onerror="this.outerHTML=\'<div class=&quot;'+cls+' ph&quot;>♪</div>\'">';
  }

  // ── Browse / search ───────────────────────────────────────────────
  function loadBrowse(){
    main.innerHTML = '<div class="hint">Loading…</div>';
    fetch('/api/navidrome/albums?type=' + encodeURIComponent(browseType) + '&size=40')
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.error){ main.innerHTML = '<div class="hint">⚠️ ' + esc(d.error) + '</div>'; return; }
        renderAlbums(d.albums, null);
      })
      .catch(function(){ main.innerHTML = '<div class="hint">⚠️ Could not reach the server.</div>'; });
  }

  function doSearch(query){
    main.innerHTML = '<div class="hint">Searching…</div>';
    fetch('/api/navidrome/search?q=' + encodeURIComponent(query))
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.error){ main.innerHTML = '<div class="hint">⚠️ ' + esc(d.error) + '</div>'; return; }
        var albums = d.albums || [], songs = d.songs || [];
        if(albums.length === 0 && songs.length === 0){ main.innerHTML = '<div class="hint">No results for “' + esc(query) + '”.</div>'; return; }
        var html = '';
        if(albums.length){ html += '<div class="section-title">Albums</div>' + gridHtml(albums); }
        if(songs.length){ html += '<div class="section-title">Songs</div>' + songsHtml(songs); }
        main.innerHTML = html;
      })
      .catch(function(){ main.innerHTML = '<div class="hint">⚠️ Search failed.</div>'; });
  }

  function renderAlbums(albums, title){
    if(!albums || !albums.length){ main.innerHTML = '<div class="hint">No albums found.</div>'; return; }
    main.innerHTML = (title ? '<div class="section-title">'+esc(title)+'</div>' : '') + gridHtml(albums);
  }

  function gridHtml(albums){
    var h = '<div class="grid">';
    albums.forEach(function(al, i){
      albumCache[al.id] = al;
      var sub = esc(al.artist || '') + (al.year ? ' · ' + al.year : '');
      h += '<div class="card" onclick="openAlbum(\'' + esc(al.id).replace(/'/g,"\\'") + '\')">' +
           coverImg(al.coverArt, 300, 'cover') +
           '<div class="cname">' + esc(al.name) + '</div>' +
           '<div class="cartist">' + sub + '</div></div>';
    });
    return h + '</div>';
  }

  function songsHtml(songs){
    var h = '';
    songs.forEach(function(s){
      var payload = encodeURIComponent(JSON.stringify(s));
      h += '<div class="songrow">' +
           coverImg(s.coverArt, 80, 'sart') +
           '<div class="songmeta"><div class="stitle">' + esc(s.title) + '</div>' +
           '<div class="ssub">' + esc(s.artist) + (s.album ? ' — ' + esc(s.album) : '') + '</div></div>' +
           '<button class="dlbtn" onclick="downloadSong(this, \'' + payload + '\')">⬇</button></div>';
    });
    return h;
  }

  var albumCache = {};

  // ── Album detail ──────────────────────────────────────────────────
  window.openAlbum = function(id){
    var al = albumCache[id];
    if(!al) return;
    currentAlbum = al;
    document.getElementById('dcover').src = coverUrl(al.coverArt, 400);
    document.getElementById('dtitle').textContent = al.name;
    document.getElementById('dsub').textContent = (al.artist||'') + (al.year? ' · '+al.year : '') + (al.songCount? ' · '+al.songCount+' songs':'');
    document.getElementById('dsongs').innerHTML = '<div class="hint">Loading tracks…</div>';
    var dlall = document.getElementById('dlall');
    dlall.disabled = false; dlall.textContent = '⬇ Download Album';
    document.getElementById('detail').style.display = 'block';
    window.scrollTo(0,0);

    fetch('/api/navidrome/album?id=' + encodeURIComponent(id))
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.error){ document.getElementById('dsongs').innerHTML = '<div class="hint">⚠️ ' + esc(d.error) + '</div>'; return; }
        renderTracks(d.songs || []);
      })
      .catch(function(){ document.getElementById('dsongs').innerHTML = '<div class="hint">⚠️ Could not load tracks.</div>'; });
  };

  function renderTracks(songs){
    if(!songs.length){ document.getElementById('dsongs').innerHTML = '<div class="hint">No tracks.</div>'; return; }
    var h = '';
    songs.forEach(function(s){
      var btn = s.downloaded
        ? '<button class="dlbtn done">✓</button>'
        : '<button class="dlbtn" onclick="downloadTrack(this, \'' + esc(s.id).replace(/'/g,"\\'") + '\')">⬇</button>';
      h += '<div class="trow"><div class="tnum">' + (s.track||'') + '</div>' +
           '<div class="tmeta"><div class="stitle">' + esc(s.title) + '</div>' +
           '<div class="ssub">' + esc(s.artist) + '</div></div>' +
           '<div class="tdur">' + fmtDur(s.duration) + '</div>' + btn + '</div>';
    });
    document.getElementById('dsongs').innerHTML = h;
  }

  window.closeDetail = function(){ document.getElementById('detail').style.display = 'none'; currentAlbum = null; };

  // ── Downloads ─────────────────────────────────────────────────────
  function postDownload(body, onOk){
    body.transcoded = (quality === 'mp3');
    fetch('/api/navidrome/download', { method:'POST', body: JSON.stringify(body) })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.ok){
          if(d.queued > 0) toast('⬇ Queued ' + d.queued + (d.queued===1?' track':' tracks'));
          else if(d.alreadyHave > 0) toast('✓ Already downloaded');
          if(onOk) onOk(d);
          pollQueue();
        } else {
          toast('⚠️ ' + (d.error || 'Download failed'));
        }
      })
      .catch(function(){ toast('⚠️ Request failed'); });
  }

  window.downloadCurrentAlbum = function(){
    if(!currentAlbum) return;
    var btn = document.getElementById('dlall');
    btn.disabled = true; btn.textContent = '⏳ Queueing…';
    postDownload({ albumId: currentAlbum.id }, function(){
      btn.textContent = '⬇ Download Album'; btn.disabled = false;
    });
  };

  window.downloadTrack = function(btn, songId){
    if(!currentAlbum) return;
    btn.disabled = true; btn.textContent = '⏳';
    postDownload({ albumId: currentAlbum.id, songIds: [songId] }, function(){
      btn.textContent = '⬇'; btn.disabled = false;
    });
  };

  window.downloadSong = function(btn, payload){
    var song;
    try { song = JSON.parse(decodeURIComponent(payload)); } catch(e){ return; }
    btn.disabled = true; btn.textContent = '⏳';
    postDownload({ songs: [song] }, function(){ btn.textContent = '⬇'; btn.disabled = false; });
  };

  // ── Download-manager dock ─────────────────────────────────────────
  var dockmain = document.getElementById('dockmain');
  var docksub = document.getElementById('docksub');
  var bar = document.getElementById('bar');
  var barfill = document.getElementById('barfill');
  var pendingList = document.getElementById('pendingList');

  function renderQueue(d){
    var active = d.active, total = d.total||0, done = d.done||0, pending = d.pending||[];
    if(!active && pending.length === 0){
      dockmain.textContent = 'No downloads';
      docksub.textContent = 'Queue is empty';
      bar.classList.remove('indet'); barfill.style.width = '0%';
      pendingList.innerHTML = '<div class="prow" style="border:none;color:#7A7A88">Nothing queued.</div>';
      return 8000;
    }
    dockmain.textContent = '⬇ ' + (d.current || 'Downloading…');
    var remaining = pending.length;
    docksub.textContent = (done + (active?1:0)) + ' / ' + total + '  ·  ' + remaining + ' waiting';
    if(d.percent >= 0){ bar.classList.remove('indet'); barfill.style.width = d.percent + '%'; }
    else { bar.classList.add('indet'); }
    var ph = '<div class="prow" style="border:none;display:flex;align-items:center;gap:8px">' +
             '<b style="color:#B39DDB">Queue</b> <span style="flex-grow:1"></span>' +
             '<button class="clearbtn" onclick="clearQueue()">Clear pending</button></div>';
    if(remaining === 0) ph += '<div class="prow" style="color:#7A7A88">Last track downloading…</div>';
    else pending.forEach(function(t){ ph += '<div class="prow">• ' + esc(t) + '</div>'; });
    pendingList.innerHTML = ph;
    return 2000;
  }

  function pollQueue(){
    if(pollTimer){ clearTimeout(pollTimer); pollTimer = null; }
    fetch('/api/navidrome/queue')
      .then(function(r){ return r.json(); })
      .then(function(d){ var next = renderQueue(d); pollTimer = setTimeout(pollQueue, next); })
      .catch(function(){ pollTimer = setTimeout(pollQueue, 8000); });
  }

  window.clearQueue = function(){
    fetch('/api/navidrome/cancel', { method:'POST' })
      .then(function(r){ return r.json(); })
      .then(function(d){ if(d.removed>0) toast('Cleared ' + d.removed + ' from queue'); pollQueue(); })
      .catch(function(){ toast('⚠️ Could not clear'); });
  };

  window.togglePending = function(){
    var p = document.getElementById('pending');
    p.classList.toggle('open');
    document.getElementById('chev').textContent = p.classList.contains('open') ? '⌄' : '⌃';
  };

  // ── Wiring ────────────────────────────────────────────────────────
  q.addEventListener('input', function(){
    clearq.style.display = q.value ? 'block' : 'none';
    clearTimeout(searchTimer);
    var val = q.value.trim();
    document.getElementById('chips').style.display = val ? 'none' : 'flex';
    if(!val){ loadBrowse(); return; }
    searchTimer = setTimeout(function(){ doSearch(val); }, 350);
  });
  clearq.addEventListener('click', function(){ q.value=''; clearq.style.display='none';
    document.getElementById('chips').style.display='flex'; loadBrowse(); q.focus(); });

  document.getElementById('chips').addEventListener('click', function(e){
    var chip = e.target.closest('.chip'); if(!chip) return;
    browseType = chip.getAttribute('data-type');
    Array.prototype.forEach.call(this.querySelectorAll('.chip'), function(c){ c.classList.remove('active'); });
    chip.classList.add('active');
    loadBrowse();
  });

  document.getElementById('qtoggle').addEventListener('click', function(e){
    var span = e.target.closest('span'); if(!span) return;
    quality = span.getAttribute('data-q');
    Array.prototype.forEach.call(this.querySelectorAll('span'), function(s){ s.classList.remove('on'); });
    span.classList.add('on');
  });

  // Close detail with browser back-ish (Escape) for desktop testing
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDetail(); });

  loadBrowse();
  pollQueue();
})();
</script>
</body>
</html>
